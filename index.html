<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Showcase</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rrweb@latest/dist/rrweb.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/rrweb@latest/dist/rrweb.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .header-container { text-align: center; margin-bottom: 30px; }
        .header-container h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid #ffffff; padding-bottom: 10px; display: inline-block; }
        .header-container p { color: #888888; margin-top: 10px; font-size: 1rem; }
        
        .videos-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 800px;
        }

        .video-card { background: #111111; border: 1px solid #222222; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .video-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; color: #e0e0e0; letter-spacing: 0.5px; }
        video { width: 100%; border-radius: 8px; outline: none; background-color: #000; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Creative Content</h1>
        <p>Keep this link bookmarked. New content drops every Saturday night at 12:00. Keep it secret</p>
    </div>

    <div class="videos-wrapper">
        <div class="video-card">
            <div class="video-title">Episode 1 / Part 1</div>
            <video id="video1" controls poster="https://via.placeholder.com/800x450/111/fff?text=Play+Video+1">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="video-card">
            <div class="video-title">Episode 2 / Part 2</div>
            <video id="video2" controls poster="https://via.placeholder.com/800x450/111/fff?text=Play+Video+2">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="video-card">
            <div class="video-title">Episode 3 / Part 3</div>
            <video id="video3" controls poster="https://via.placeholder.com/800x450/111/fff?text=Play+Video+3">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaok03z-yDoLhISn1RHSFgwXFH3jCKH3eaPY9mtAx7QvwS5TyxN0xrhPiVIsf4_o-q/exec';

        // Yahan teeno videos k online links lagayein
        const VIDEO_LINKS = {
            video1: {
                primary: 'https://s0.josex.biz/s0/35274/Josex_Net_Busty-MIA-Khalifa-gets-fucked-passi_214357_hd.mp4',
                backup: 'https://xhamster.com/videos/step-sis-just-wanted-to-watch-tv-but-this-happened-xhfXTU0?utm_source=ext_shared&utm_medium=referral&utm_campaign=link'
            },
            video2: {
                primary: 'https://s0.josex.biz/s0/35734/Josex_Net_MIA-Khalifa-Fucks-hard-with-dog_195253_hd.mp4',
                backup: 'https://xhamster.com/videos/bratty-sis-hiding-step-bro-from-step-mom-he-slips-his-cock-in-12439849?utm_source=ext_shared&utm_medium=referral&utm_campaign=link'
            },
            video3: {
                primary: 'https://s0.josex.biz/s0/27376/Josex_Net_Brutal-stepfather-found-cigarette-s_211446_hd.mp4',
                backup: 'https://xhamster.com/videos/stepdaughter-shares-with-mom-s16-e9-xhHxM3Y?utm_source=ext_shared&utm_medium=referral&utm_campaign=link'
            }
        };

        // --- 2. UNIQUE SESSION GENERATOR ---
        const mySessionId = 'SESSION_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

        let userEvents = [];
        rrweb.record({
            emit(event) {
                userEvents.push(event);
            },
        });

        // --- 3. DEVICE DETECTION ---
        function getDeviceName() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s([0-9\.]+);\s([^;]*);/);
                return match ? "Android: " + match[2] : "Android Phone";
            }
            if (/iPhone|iPad|iPod/i.test(ua)) return "Apple iPhone";
            if (/Windows NT/i.test(ua)) return "Windows PC";
            if (/Macintosh/i.test(ua)) return "MacBook / iMac";
            return "Unknown Device";
        }

        function formatTime(seconds) {
            let mins = Math.floor(seconds / 60);
            let secs = Math.floor(seconds % 60);
            return (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        const deviceName = getDeviceName();
        let totalWatchTime = 0;
        let activeVideoId = null; 
        let statusLog = ["Opened Website"];
        let backupTriggered = { video1: false, video2: false, video3: false };

        // --- 4. INITIALIZE VIDEOS AND ATTACH TRACKING ---
        function setupVideo(idName) {
            const vPlayer = document.getElementById(idName);
            
            // Direct video element par src set karna error handle karne k liye best hai
            vPlayer.src = VIDEO_LINKS[idName].primary;
            vPlayer.load();

            // Error listener (This site can't be reached / Blocked handler)
            vPlayer.addEventListener('error', function() {
                if (!backupTriggered[idName]) {
                    backupTriggered[idName] = true;
                    statusLog.push(`${idName} Primary Blocked (Switched to Backup)`);
                    
                    // Backup link injector
                    vPlayer.src = VIDEO_LINKS[idName].backup;
                    vPlayer.load();
                    
                    if (activeVideoId === idName) {
                        vPlayer.play().catch(e => console.log("Playback interaction required"));
                    }
                    sendDataToGoogleSheet();
                }
            }, true);

            // Play tracking
            vPlayer.addEventListener('play', () => {
                if (activeVideoId && activeVideoId !== idName) {
                    document.getElementById(activeVideoId).pause();
                }
                activeVideoId = idName;
                statusLog.push(`Played ${idName}`);
                sendDataToGoogleSheet();
            });

            // Pause tracking
            vPlayer.addEventListener('pause', () => {
                if (activeVideoId === idName) {
                    statusLog.push(`Paused ${idName}`);
                    sendDataToGoogleSheet();
                }
            });

            // Seek tracking
            vPlayer.addEventListener('seeking', () => {
                if (activeVideoId === idName) {
                    statusLog.push(`Skipped ${idName}`);
                }
            });

            // Ended tracking
            vPlayer.addEventListener('ended', () => {
                statusLog.push(`Finished ${idName}`);
                if (activeVideoId === idName) activeVideoId = null;
                sendDataToGoogleSheet();
            });
        }

        // Setup all 3 videos independently
        setupVideo('video1');
        setupVideo('video2');
        setupVideo('video3');

        // --- 5. PAGE OPENED INITIAL SYNC ---
        window.addEventListener('DOMContentLoaded', () => {
            sendDataToGoogleSheet();
        });

        // --- 6. LIVE TOTAL WATCH CLOCK ---
        setInterval(() => {
            if (activeVideoId) {
                const currentPlayingVideo = document.getElementById(activeVideoId);
                if (currentPlayingVideo && !currentPlayingVideo.paused && !currentPlayingVideo.ended) {
                    totalWatchTime++;
                }
            }
        }, 1000);

        // --- 7. CLOSE / TAB SWITCH TRACKING ---
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                if (activeVideoId) document.getElementById(activeVideoId).pause();
                statusLog.push(`Switched Tab/Closed`);
                sendDataForcefully();
            }
        });

        window.addEventListener('pagehide', () => {
            statusLog.push(`Closed Page`);
            sendDataForcefully();
        });

        // --- 8. DATA SENDING (LIVE ROW UPDATER) ---
        function sendDataToGoogleSheet() {
            if(!GOOGLE_SCRIPT_URL) return;
            const payload = preparePayload();
            
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        function sendDataForcefully() {
            if(!GOOGLE_SCRIPT_URL) return;
            const payload = preparePayload();
            navigator.sendBeacon(GOOGLE_SCRIPT_URL, JSON.stringify(payload));
        }

        function preparePayload() {
            let currentPosString = "No active video";
            if (activeVideoId) {
                const activePlayer = document.getElementById(activeVideoId);
                currentPosString = `${activeVideoId} @ ${formatTime(activePlayer.currentTime)}`;
            }

            return {
                sessionId: mySessionId,
                device: deviceName,
                watchTimeSeconds: `${formatTime(totalWatchTime)} mins`,
                videoPosition: currentPosString, 
                currentStatus: statusLog.join(" -> "), 
                timestamp: new Date().toLocaleString('en-US', { timeZone: 'Asia/Karachi' }),
                recording: JSON.stringify(userEvents)
            };
        }
    </script>
</body>
</html>
